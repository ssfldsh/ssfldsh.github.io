ss="comment"> * &#125;</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Solution</span> </span>&#123;</span><br><span class="line">    <span class="function"><span class="keyword">public</span> ListNode <span class="title">reverseList</span><span class="params">(ListNode head)</span> </span>&#123;</span><br><span class="line">        <span class="comment">//特殊输入</span></span><br><span class="line">        <span class="keyword">if</span>(head==<span class="keyword">null</span>) <span class="keyword">return</span> <span class="keyword">null</span>;</span><br><span class="line">        <span class="comment">/*</span></span><br><span class="line"><span class="comment">        //运行时间最短的最佳答案，多对一种常见特殊情况做了特殊处理</span></span><br><span class="line"><span class="comment">        if(head == null || head.next == null)&#123;</span></span><br><span class="line"><span class="comment">            return head;</span></span><br><span class="line"><span class="comment">        &#125;*/</span></span><br><span class="line">        <span class="comment">//新建一个链表注意将head.next初始化为null，要不然有成为野指针的风险</span></span><br><span class="line">        ListNode ans=<span class="keyword">new</span> ListNode(<span class="number">0</span>);</span><br><span class="line">        ans.next=<span class="keyword">null</span>;</span><br><span class="line">        <span class="comment">//ListNode p1=head;链表指针的赋值语句</span></span><br><span class="line">        ListNode p1=<span class="keyword">new</span> ListNode(<span class="number">0</span>);</span><br><span class="line">        p1=head;</span><br><span class="line"></span><br><span class="line">        <span class="comment">//测试语句System.out.println(p1.val);</span></span><br><span class="line"></span><br><span class="line">       <span class="comment">/* //链表常用解法</span></span><br><span class="line"><span class="comment">       while(p1!=null)&#123;</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">            p1=p1.next;</span></span><br><span class="line"><span class="comment">        &#125;*/</span></span><br><span class="line">        ListNode p2=<span class="keyword">new</span> ListNode(<span class="number">0</span>);</span><br><span class="line">        p2.next=<span class="keyword">null</span>;</span><br><span class="line">        p2=ans;</span><br><span class="line">        <span class="comment">/*</span></span><br><span class="line"><span class="comment">        //顺序链表的构建</span></span><br><span class="line"><span class="comment">        while(p1!=null)&#123;</span></span><br><span class="line"><span class="comment">            ListNode temp=new ListNode(0);</span></span><br><span class="line"><span class="comment">            temp.next=null;</span></span><br><span class="line"><span class="comment">            temp.val=p1.val;</span></span><br><span class="line"><span class="comment">            p2.next=temp;</span></span><br><span class="line"><span class="comment">            p2=p2.next;</span></span><br><span class="line"><span class="comment">            p1=p1.next;</span></span><br><span class="line"><span class="comment">        &#125;*/</span></span><br><span class="line">        <span class="keyword">while</span>(p1!=<span class="keyword">null</span>)&#123;</span><br><span class="line">            ListNode temp=<span class="keyword">new</span> ListNode(<span class="number">0</span>);</span><br><span class="line">            temp.next=<span class="keyword">null</span>;</span><br><span class="line">            temp.val=p1.val;</span><br><span class="line">            temp.next=ans.next;</span><br><span class="line">            ans.next=temp;</span><br><span class="line">            <span class="comment">//链表的倒插入法不需要指向新建链表的辅助指针p2</span></span><br><span class="line">            p1=p1.next;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">return</span> ans.next;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//解法二：递归解法</span></span><br><span class="line"><span class="comment">//解法一：循环：终止条件P==null,和数组中遍历数组用到的i&lt;a.length不同</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//我这是通过尾插法一个链表，不改变原链表，想法挺好的。还有一种双指针法改变了原链表。</span></span><br><span class="line"><span class="comment">//两种思路的比较：比较输入和输出，有两条不同的链表，输出可以是在原链表的基础上变化</span></span><br><span class="line"><span class="comment">//而来，也可以是新开辟的链表通过尾插法或者头插法新建而成。一种思想，不改变原链表，</span></span><br><span class="line"><span class="comment">//新建一个链表进行操作，第二种思想不另外开辟空间，直接在原链表上进行操作。</span></span><br><span class="line"><span class="comment">//https://leetcode-cn.com/problems/reverse-linked-list/solution/shi-pin-jiang-jie-di-gui-by-geek-8m/</span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Solution</span> </span>&#123;</span><br><span class="line">    <span class="function"><span class="keyword">public</span> ListNode <span class="title">reverseList</span><span class="params">(ListNode head)</span> </span>&#123;</span><br><span class="line">        <span class="comment">//其他f(n)可以由f(n-1)，f(1)推得，f(1)已知，f(n-1),f(1)=&gt;f(n)的方法也已知。</span></span><br><span class="line">        <span class="comment">//f(n)也可以由其他方法推得</span></span><br><span class="line">        <span class="keyword">if</span>(head==<span class="keyword">null</span>) <span class="keyword">return</span> head;</span><br><span class="line">        <span class="comment">//f(1)</span></span><br><span class="line">        <span class="keyword">if</span>(head.next==<span class="keyword">null</span>) <span class="keyword">return</span> head;<span class="comment">//or return null</span></span><br><span class="line">        <span class="comment">//else  利用f(n-1),f(n-2)计算</span></span><br><span class="line">        ListNode p=<span class="keyword">new</span> ListNode(<span class="number">0</span>);</span><br><span class="line">        p.next=<span class="keyword">null</span>;</span><br><span class="line">        p=head.next;</span><br><span class="line">        <span class="comment">//灵魂语句：嵌套利用原函数。</span></span><br><span class="line">        p=reverseList(p); </span><br><span class="line"></span><br><span class="line">        head.next=<span class="keyword">null</span>;</span><br><span class="line">        ListNode q=<span class="keyword">new</span> ListNode(<span class="number">0</span>);</span><br><span class="line">        q=p;</span><br><span class="line">        <span class="keyword">while</span>(q.next!=<span class="keyword">null</span>) q=q.next;</span><br><span class="line">        q.next=head; </span><br><span class="line">        <span class="keyword">return</span> p;         </span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">//数值型的递归程序比较好编写，直接定义函数f(n)在f(n)的编写时利用f(n-1)或者其他f(m)即可</span></span><br><span class="line"><span class="comment">//即根据函数递归的思想，在编写一个函数时，可以在函数里嵌套调用这个函数。注意递归出口的问题。</span></span><br><span class="line"><span class="comment">//递归即在函数编写时调用自身函数的特点：可以被循环和堆栈代替。</span></span><br><span class="line"><span class="comment">//它的优点在于缩减代码量，减少编程和思考的负担。递归展开和堆栈调用交由编译器自己执行。</span></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">f</span><span class="params">(<span class="keyword">int</span> n)</span></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(n=<span class="number">1</span>) <span class="keyword">return</span> XX;</span><br><span class="line">    <span class="keyword">else</span> <span class="keyword">return</span> f(n-<span class="number">1</span>)+f(<span class="number">1</span>);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//双指针操作反转</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">// @lc code=end</span></span><br></pre></td></tr></table></figure>
